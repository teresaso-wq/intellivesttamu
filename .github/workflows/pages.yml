name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Inject API secrets
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
        run: |
          find frontend -name "*.js" -exec sed -i \
            -e "s/__FINNHUB_KEY__/${FINNHUB_KEY}/g" \
            -e "s/__GROQ_KEY__/${GROQ_KEY}/g" \
            {} \;
          echo "Secrets injected into JS files"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
